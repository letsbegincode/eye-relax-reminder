<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title></title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:rgba(0,0,0,0.01)!important;font-family:'Segoe UI',system-ui,sans-serif}
body{display:flex;justify-content:center;align-items:center}
.vc{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:flex-end;background:transparent!important;pointer-events:none}
video{display:none;width:100%;height:100%;object-fit:contain;background:transparent!important;pointer-events:none;mix-blend-mode:screen}
canvas{width:100%;height:100%;display:block;pointer-events:none}
.hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;pointer-events:none;animation:fio 3s infinite;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.5);z-index:10}
.timer{position:absolute;top:24px;right:28px;color:rgba(255,255,255,.55);font-size:16px;font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.5);z-index:10}
.msg{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.3);font-size:20px;font-weight:600;pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.3);z-index:10;opacity:0;animation:mi 1.5s ease .5s forwards;display:none}
.pb{position:absolute;bottom:0;left:0;width:100%;height:3px;z-index:10;pointer-events:none}
.pf{height:100%;width:100%;background:linear-gradient(90deg,rgba(123,107,244,.7),rgba(255,123,160,.7));border-radius:0 2px 2px 0;transition:width .15s linear}
@keyframes fio{0%,100%{opacity:0}50%{opacity:1}}
@keyframes mi{to{opacity:1}}
</style>
</head>
<body>
<div class="vc">
  <video id="vid" loop autoplay muted playsinline></video>
  <canvas id="cvs"></canvas>
</div>
<div class="msg" id="msg">Rest your eyes 🌿</div>
<div class="hint">Press ESC to skip</div>
<div class="timer" id="tmr">10s</div>
<div class="pb"><div class="pf" id="pf"></div></div>
<script>
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d'),vid=document.getElementById('vid'),tmr=document.getElementById('tmr'),pf=document.getElementById('pf'),msgEl=document.getElementById('msg');
let dur=10,t0=Date.now(),mode='animation';
function resize(){cvs.width=innerWidth;cvs.height=innerHeight}
resize();addEventListener('resize',resize);
function setTimer(s){dur=s;t0=Date.now();tmr.textContent=dur+'s'}
function fallback(){mode='animation';cvs.style.display='block';vid.style.display='none';vid.pause();vid.removeAttribute('src');vid.load();animate()}
async function init(){
  try{
    const s=await window.electronAPI.getSettings();
    if(s&&typeof s.videoDurationSeconds==='number')setTimer(s.videoDurationSeconds);
    mode=(s&&s.displayMode)||'animation';
    if(mode==='video'){
      cvs.style.display='none';
      vid.style.display='block';
      msgEl.style.display='none';
      if(s&&s.videoFile) {
        vid.src=s.videoFile;
      }
      vid.play().catch((e) => {
        console.error('Video play failed:', e.message);
        fallback();
      });
      return;
    }
  }catch(e){console.error(e)}
  cvs.style.display='block';vid.style.display='none';vid.pause();msgEl.style.display='block';animate();
}
addEventListener('DOMContentLoaded',init);

/* ═══════ FLUFFY PERSIAN CAT ═══════ */

function furEdge(cx,cy,rx,ry,bumps,bumpSize,rot){
  // Draw a fluffy edge (ellipse with bumpy fur outline)
  ctx.beginPath();
  for(let i=0;i<=bumps*4;i++){
    const a=(i/(bumps*4))*Math.PI*2+rot;
    const bump=Math.sin(i*Math.PI/2)*bumpSize;
    const x=cx+Math.cos(a)*(rx+bump);
    const y=cy+Math.sin(a)*(ry+bump);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
}

function drawPersianCat(x,y,sc,breath,blink,tailWag){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(sc,sc);

  const br=Math.sin(breath)*3; // breathing offset

  // ── Fluffy Tail ──
  ctx.save();
  ctx.translate(75,20);
  ctx.rotate(Math.sin(tailWag)*0.15);
  const tg=ctx.createLinearGradient(0,-20,40,80);
  tg.addColorStop(0,'#E8D5B7');tg.addColorStop(1,'#D4BC94');
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(50,-60,80,-40,70,10);
  ctx.bezierCurveTo(65,35,40,50,20,30);
  ctx.bezierCurveTo(10,20,5,10,0,0);
  ctx.fill();
  // tail fur lines
  ctx.strokeStyle='rgba(190,165,120,.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(20,-10);ctx.quadraticCurveTo(50,-35,60,-15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(15,5);ctx.quadraticCurveTo(45,-20,55,0);ctx.stroke();
  ctx.restore();

  // ── Body (fluffy oval) ──
  const bodyG=ctx.createRadialGradient(-5,70+br,10,-5,70+br,95);
  bodyG.addColorStop(0,'#F5E6CE');bodyG.addColorStop(.6,'#E8D5B7');bodyG.addColorStop(1,'#D4BC94');
  ctx.fillStyle=bodyG;
  furEdge(0,70+br,85,58,18,5,0);
  ctx.fill();

  // body fur texture
  ctx.strokeStyle='rgba(180,155,115,.15)';ctx.lineWidth=1;
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,r=30+Math.random()*40;
    const bx=Math.cos(a)*r,by=70+br+Math.sin(a)*r*.7;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a)*8,by+Math.sin(a)*5);ctx.stroke();
  }

  // belly highlight
  ctx.fillStyle='rgba(255,245,230,.4)';
  ctx.beginPath();ctx.ellipse(-10,60+br,35,22,-.2,0,Math.PI*2);ctx.fill();

  // ── Front Paws ──
  ctx.fillStyle='#E8D5B7';
  // left paw
  ctx.beginPath();ctx.ellipse(-40,125+br,20,14,-.15,0,Math.PI*2);ctx.fill();
  // right paw
  ctx.beginPath();ctx.ellipse(40,125+br,20,14,.15,0,Math.PI*2);ctx.fill();
  // paw pads
  ctx.fillStyle='#F2C4B8';
  ctx.beginPath();ctx.ellipse(-40,122+br,9,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(40,122+br,9,6,0,0,Math.PI*2);ctx.fill();
  // tiny toe beans
  ctx.fillStyle='#EBB5A7';
  for(let p=-1;p<=1;p+=1){
    ctx.beginPath();ctx.arc(-40+p*6,118+br,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(40+p*6,118+br,2.5,0,Math.PI*2);ctx.fill();
  }

  // ── Head (big round Persian face) ──
  const headG=ctx.createRadialGradient(-5,-25,5,-5,-25,80);
  headG.addColorStop(0,'#FFF3E4');headG.addColorStop(.5,'#F5E6CE');headG.addColorStop(1,'#E2CEAE');
  ctx.fillStyle=headG;
  furEdge(0,-25,72,68,22,4,0.5);
  ctx.fill();

  // ── Ears (small, round Persian ears) ──
  // left ear
  ctx.fillStyle='#E2CEAE';
  ctx.beginPath();ctx.moveTo(-45,-75);ctx.quadraticCurveTo(-65,-115,-30,-85);ctx.closePath();ctx.fill();
  ctx.fillStyle='#F2C4B8';
  ctx.beginPath();ctx.moveTo(-44,-80);ctx.quadraticCurveTo(-58,-105,-35,-87);ctx.closePath();ctx.fill();
  // right ear
  ctx.fillStyle='#E2CEAE';
  ctx.beginPath();ctx.moveTo(45,-75);ctx.quadraticCurveTo(65,-115,30,-85);ctx.closePath();ctx.fill();
  ctx.fillStyle='#F2C4B8';
  ctx.beginPath();ctx.moveTo(44,-80);ctx.quadraticCurveTo(58,-105,35,-87);ctx.closePath();ctx.fill();

  // ── Cheek fluff ──
  ctx.fillStyle='rgba(242,220,195,.7)';
  ctx.beginPath();ctx.ellipse(-55,-10,20,25,-.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(55,-10,20,25,.2,0,Math.PI*2);ctx.fill();

  // ── Muzzle (flat Persian face) ──
  ctx.fillStyle='#FFF0DD';
  ctx.beginPath();ctx.ellipse(0,5,30,22,0,0,Math.PI*2);ctx.fill();

  // ── Eyes (big, round, sparkly) ──
  const eyeOpen=Math.max(0.05,blink);
  const ew=22,eh=ew*eyeOpen;
  // eye whites
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();ctx.ellipse(-28,-22,ew,eh,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(28,-22,ew,eh,0,0,Math.PI*2);ctx.fill();

  if(eyeOpen>0.3){
    // iris (amber/copper — Persian cat eyes)
    const irisG=ctx.createRadialGradient(-28,-22,3,-28,-22,14);
    irisG.addColorStop(0,'#F4A940');irisG.addColorStop(.5,'#D4822A');irisG.addColorStop(1,'#8B5A1B');
    ctx.fillStyle=irisG;
    ctx.beginPath();ctx.arc(-28,-22,13,0,Math.PI*2);ctx.fill();
    const irisG2=ctx.createRadialGradient(28,-22,3,28,-22,14);
    irisG2.addColorStop(0,'#F4A940');irisG2.addColorStop(.5,'#D4822A');irisG2.addColorStop(1,'#8B5A1B');
    ctx.fillStyle=irisG2;
    ctx.beginPath();ctx.arc(28,-22,13,0,Math.PI*2);ctx.fill();
    // pupils
    ctx.fillStyle='#1A0E00';
    ctx.beginPath();ctx.ellipse(-28,-22,5,7*Math.min(1,eyeOpen),0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(28,-22,5,7*Math.min(1,eyeOpen),0,0,Math.PI*2);ctx.fill();
    // sparkle highlights
    ctx.fillStyle='rgba(255,255,255,.95)';
    ctx.beginPath();ctx.arc(-22,-28,4.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(34,-28,4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.beginPath();ctx.arc(-32,-17,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(24,-17,2.5,0,Math.PI*2);ctx.fill();
  }
  // eyelids
  if(eyeOpen<0.9){
    ctx.fillStyle='#E8D5B7';
    ctx.beginPath();ctx.ellipse(-28,-22-eh*.3,ew+2,ew*(1-eyeOpen),0,0,Math.PI);ctx.fill();
    ctx.beginPath();ctx.ellipse(28,-22-eh*.3,ew+2,ew*(1-eyeOpen),0,0,Math.PI);ctx.fill();
  }

  // ── Nose (tiny pink Persian nose) ──
  ctx.fillStyle='#E8888B';
  ctx.beginPath();
  ctx.moveTo(0,0);ctx.lineTo(-5,7);ctx.quadraticCurveTo(0,10,5,7);ctx.closePath();ctx.fill();
  // nose highlight
  ctx.fillStyle='rgba(255,200,200,.4)';
  ctx.beginPath();ctx.ellipse(-1,3,2,1.5,0,0,Math.PI*2);ctx.fill();

  // ── Mouth ──
  ctx.strokeStyle='#B07070';ctx.lineWidth=1.8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-4,10);ctx.quadraticCurveTo(0,16,4,10);ctx.stroke();

  // ── Whiskers (long, elegant) ──
  ctx.strokeStyle='rgba(180,160,130,.5)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(-20,5);ctx.lineTo(-65,-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-20,9);ctx.lineTo(-62,12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-18,13);ctx.lineTo(-58,22);ctx.stroke();
  ctx.beginPath();ctx.moveTo(20,5);ctx.lineTo(65,-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(20,9);ctx.lineTo(62,12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(18,13);ctx.lineTo(58,22);ctx.stroke();

  // ── Forehead fur tuft ──
  ctx.fillStyle='#E8D5B7';
  ctx.beginPath();ctx.moveTo(-8,-65);ctx.quadraticCurveTo(0,-80,8,-65);ctx.quadraticCurveTo(3,-72,-2,-72);ctx.closePath();ctx.fill();

  ctx.restore();
}

let frame=0;
function animate(){
  if(mode!=='animation')return;
  ctx.clearRect(0,0,cvs.width,cvs.height);
  const t=frame*.016; // pseudo-time in seconds
  const floatY=Math.sin(t*0.8)*15;
  const floatX=Math.sin(t*0.5)*5;
  const breath=t*2.5;
  // slow blink cycle: open for ~3s, blink quickly
  const blinkCycle=(t*0.7)%4;
  let blink=1;
  if(blinkCycle>3.5)blink=Math.max(0,1-(blinkCycle-3.5)*5);
  if(blinkCycle>3.7)blink=Math.min(1,(blinkCycle-3.7)*5);
  const tailWag=t*1.5;
  const cx=cvs.width/2+floatX,cy=cvs.height/2+floatY;

  // soft warm glow behind cat
  const glow=ctx.createRadialGradient(cx,cy-20,0,cx,cy-20,200);
  glow.addColorStop(0,'rgba(255,235,200,.3)');glow.addColorStop(.5,'rgba(255,220,180,.12)');glow.addColorStop(1,'rgba(255,220,180,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cy-20,200,0,Math.PI*2);ctx.fill();

  drawPersianCat(cx,cy,2.2,breath,blink,tailWag);

  // Z bubbles when eyes closing
  if(blink<0.4){
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.font='bold 48px "Segoe UI",sans-serif';
    const za=.5+Math.sin(t*1.5)*.3;
    ctx.globalAlpha=za;
    ctx.fillText('Z',cx+170,cy-130+Math.sin(t*2)*8);
    ctx.font='bold 34px "Segoe UI",sans-serif';
    ctx.fillText('z',cx+140,cy-70+Math.sin(t*2.5)*6);
    ctx.font='bold 24px "Segoe UI",sans-serif';
    ctx.fillText('z',cx+120,cy-30+Math.sin(t*3)*5);
    ctx.restore();
  }

  frame++;
  requestAnimationFrame(animate);
}

function close(){vid.pause();window.electronAPI.closeWindow()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});
document.addEventListener('click', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());
setInterval(()=>{const el=(Date.now()-t0)/1000,rem=Math.max(0,Math.ceil(dur-el));tmr.textContent=rem+'s';pf.style.width=(rem/dur*100)+'%';if(el>=dur)close()},100);
vid.addEventListener('error', () => fallback());
</script>
</body>
</html>
